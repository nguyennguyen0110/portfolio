<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Nguyen Nguyen">
    <meta name="description" content="Trang portfolio">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Portfolio của Nguyên{% endblock %}</title>

    <!-- Shared JS: theme + language logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>Chào mừng đến với trang portfolio của tôi</h1>

    <nav>
        <ul class="menu">
            <li class="menu-li"><a href="{{ url_for('vi.about') }}">Giới thiệu</a></li>
            <li class="menu-li"><a href="{{ url_for('vi.experience') }}">Kinh nghiệm</a></li>
            <li class="menu-li"><a href="{{ url_for('vi.skill') }}">Kỹ năng</a></li>
            <li class="menu-li"><a href="{{ url_for('vi.education') }}">Học vấn</a></li>
            <li class="menu-li"><a href="{{ url_for('vi.project') }}">Dự án</a></li>
        </ul>
    </nav>

    <div style="clear: both;"></div>

    <div class="preferences-bar">
        <!-- Theme selector -->
        <div class="preferences-left">
            <label for="theme-select">Chế độ hiển thị:</label>
            <select id="theme-select">
                <option value="system">Theo hệ thống</option>
                <option value="light">Sáng</option>
                <option value="dark">Tối</option>
            </select>
        </div>

        <!-- Language selector with rotating label -->
        <div class="preferences-right">
            <label id="language-label" for="language-select">🌐 Ngôn ngữ</label>
            <select id="language-select">
                <option value="en">English</option>
                <option value="vi">Tiếng Việt</option>
                <!-- Future: <option value="ja">日本語</option> -->
            </select>
        </div>
    </div>

</header>

<main>
    <p>Cập nhật lần cuối: 2026-04</p>
    {% block content %}
    {% endblock %}
</main>

<footer>
    <hr>
    <p>by: Nguyen Nguyen</p>
    <p>nguyennta@icloud.com</p>
    <p>(+84) 77 777 5995</p>
</footer>

</body>
</html>
