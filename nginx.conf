worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    server_tokens off;

    # Compress text assets on the fly.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript
                      application/json image/svg+xml;

    server {
        # Cloud Run sends traffic to the container on 8080 by default.
        listen 8080;
        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Clean URLs: /experience -> experience.html, /vi/ -> vi/index.html
        location / {
            try_files $uri $uri.html $uri/ =404;
            # HTML is small and may change between deploys: revalidate each time.
            add_header Cache-Control "no-cache" always;
        }

        # Caching for static assets (css/js/images). css/js filenames are not
        # content-hashed, so 1 day keeps updates showing up quickly.
        location /static/ {
            add_header Cache-Control "public, max-age=86400" always;
            access_log off;
        }
    }
}
